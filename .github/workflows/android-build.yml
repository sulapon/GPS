name: Build Android APK (PWA Builder)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 修正 Action 名稱：正確的路徑是 pwa-builder/pwa-action
      - name: PWA-to-APK Build
        uses: pwa-builder/pwa-action@v2
        with:
          # 你的網頁網址 (必須已經開啟 GitHub Pages)
          url: https://sulapon.github.io/GPS/
          # 這是我們之前的 JSON 設定檔案
          source_dir: .
          # 下載結果的名字
          output_name: rf-tool-apk
