name: Build Android APK (Bubblewrap)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          # 設定 Bubblewrap 的配置檔案，使其知道 JDK 和 Android SDK 的位置
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          echo "Bubblewrap configured with JDK: $JAVA_HOME and SDK: $ANDROID_HOME"

      - name: Build APK
        run: |
          if [ ! -f "twa-manifest.json" ]; then
            echo "Error: twa-manifest.json not found."
            exit 1
          fi
          
          # 產生簽署金鑰 (自動化流程)
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=RF, OU=IT, O=RF, L=Taipei, S=Taiwan, C=TW"
          
          # 環境變數供 Bubblewrap 使用
          export BUBBLEWRAP_KEYSTORE_PASSWORD=password
          export BUBBLEWRAP_KEY_PASSWORD=password
          
          # 使用 yes 管道來自動回答所有可能的提示 (如是否同意條款)
          yes | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-tool-apk
          path: "*.apk"
