name: Build Native Offline APK (Cordova)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create myapp com.rf.tool.offline "RF計算工具"
          cd myapp
          cordova platform add android
          rm -rf www/*
          cp ../index.html www/index.html
          mkdir -p www/res/icon
          cp ../icon-512x512.png www/res/icon/icon.png || echo "Icon not found, using default"

      - name: Clean HTML for Cordova
        run: |
          cd myapp/www
          
          echo "=== 移除 PWA 專用程式碼（在 APK 裡不需要）==="
          
          # 1. 在 <head> 最前面插入 viewport（確保 WebView 正確縮放）
          sed -i 's|<head>|<head><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">|' index.html
          
          # 2. 移除 manifest 連結（APK 不需要 PWA manifest）
          sed -i 's|<link rel="manifest" href="manifest.json">||g' index.html
          
          # 3. 移除 Service Worker 註冊（APK 不需要 SW）
          sed -i "/serviceWorker/d" index.html
          sed -i "/service-worker/d" index.html
          
          # 4. 移除版本跳轉腳本（這是導致白屏/英文頁面的元兇！）
          #    這段程式碼會執行 location.replace()，在 Cordova 的 file:// 環境下會跳轉失敗
          python3 -c "
          import re
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          # 移除版本跳轉的 IIFE
          content = re.sub(r'\(function\s*\(\)\s*\{\s*const\s+VERSION\s*=.*?location\.replace\(.*?\}\s*\)\s*\(\s*\)\s*;', '', content, flags=re.DOTALL)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          "
          
          # 5. 在 </body> 前插入 cordova.js
          sed -i 's|</body>|<script src="cordova.js"></script></body>|' index.html
          
          echo "=== HTML 清理完成 ==="
          # 驗證：顯示 head 區塊的前幾行
          head -c 500 index.html
          echo ""
          echo "=== 檔案大小 ==="
          ls -lh index.html

      - name: Configure Cordova (config.xml)
        run: |
          cd myapp
          sed -i 's|<content src="index.html" />|<content src="index.html" />\n    <icon src="www/res/icon/icon.png" />\n    <preference name="android-minSdkVersion" value="22" />\n    <preference name="android-targetSdkVersion" value="33" />|' config.xml

      - name: Build Android APK
        run: |
          cd myapp
          cordova build android --verbose

      - name: Find and Copy APK
        run: |
          echo "=== 尋找所有產出的 APK 檔案 ==="
          find myapp/platforms/android -name "*.apk" -type f
          APK_PATH=$(find myapp/platforms/android -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: 找不到任何 APK 檔案！"
            exit 1
          fi
          echo "找到 APK: $APK_PATH"
          cp "$APK_PATH" RF計算工具_原生離線版.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: native-offline-apk
          path: RF計算工具_原生離線版.apk
