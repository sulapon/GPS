name: Build Android APK (Manual Robust)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (Automatic Fix)
        run: |
          # 1. 產生金鑰
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=RF, OU=IT, O=RF, L=Taipei, S=Taiwan, C=TW"
          
          # 2. 安裝 Bubblewrap
          npm install -g @bubblewrap/cli
          
          # 3. 配置環境 (JDK & SDK)
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 4. 強制初始化內部專案目錄
          mkdir -p .bubblewrap
          cp twa-manifest.json .bubblewrap/twa-manifest.json
          
          # 5. 執行編譯 (手動對應所有可能的問題)
          # y (是否重新生成), n (是否顯示紀錄), 1.0.0 (版本名), 1 (版本號)
          export BUBBLEWRAP_KEYSTORE_PASSWORD=password
          export BUBBLEWRAP_KEY_PASSWORD=password
          printf "y\nn\n1.0.0\n1\n" | bubblewrap build --skipConfig
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-tool-apk
          path: "*.apk"
