name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Android
        # 這是目前市集上最通用的 PWA 打包插件
        uses: Bubblewrap/pwa-build-action@main
        with:
          url: https://sulapon.github.io/GPS/
