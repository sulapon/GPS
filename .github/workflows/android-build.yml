name: Build Android APK (PWA-to-APK)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 使用目前在 GitHub Actions 市集上最穩定、已被驗證過的路徑：sharadcodes/pwa-to-apk-action
      - name: Build APK
        uses: sharadcodes/pwa-to-apk-action@v1
        with:
          # 你的網址
          url: https://sulapon.github.io/GPS/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-tool-apk
          path: "*.apk"
