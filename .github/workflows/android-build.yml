name: Build Android APK (Bubblewrap)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Build APK
        run: |
          # 產生金鑰
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=RF, OU=IT, O=RF, L=Taipei, S=Taiwan, C=TW"
          
          export BUBBLEWRAP_KEYSTORE_PASSWORD=password
          export BUBBLEWRAP_KEY_PASSWORD=password
          
          # 如果程式還是開口問，我們預先準備好所有的標準答案 (y, y, y, 1.0.0, 1)
          # 並使用 printf 來精確控制換行
          printf "y\ny\ny\n1.0.0\n1\n" | bubblewrap build
